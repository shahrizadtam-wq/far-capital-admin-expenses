<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Far Capital — Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0eeea;--border:rgba(0,0,0,0.09);
  --text:#1a1a18;--muted:#6b6b65;
  --accent:#1a3a2a;--accent-light:#e8f0eb;--accent-mid:#2d6b47;
  --danger:#c0392b;--danger-light:#fdf0ee;
  --amber:#b8750a;--amber-light:#fef8ee;
  --blue:#1a4b8c;--blue-light:#eef3fb;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#root{min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--accent);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.topbar-name{font-size:15px;font-weight:500;letter-spacing:-0.2px}
.topbar-sub{font-size:12px;opacity:0.6;margin-left:6px}
.topbar-actions{display:flex;gap:8px}
.btn{border:none;cursor:pointer;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;padding:7px 14px;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.btn-primary{background:var(--accent-mid);color:#fff}.btn-primary:hover{background:#245c3c}
.btn-ghost{background:rgba(255,255,255,0.12);color:#fff}.btn-ghost:hover{background:rgba(255,255,255,0.2)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid rgba(192,57,43,0.15)}.btn-danger:hover{background:#f9d9d5}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.main{display:flex;flex:1}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.12s;font-size:13px;color:var(--muted);font-weight:400;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-icon{font-size:15px}
.content{flex:1;padding:24px;overflow-y:auto}
.page-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:500;margin-bottom:6px}
.stat-value{font-size:21px;font-weight:600;letter-spacing:-0.5px;font-family:'DM Mono',monospace}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-green .stat-value{color:var(--accent-mid)}
.stat-amber .stat-value{color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:500}
.card-body{padding:16px}
.charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:500;padding:10px 14px;text-align:left;background:var(--surface2)}
td{padding:11px 14px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--accent-light)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b0{background:#e8f0eb;color:#1a3a2a}.b1{background:#eef3fb;color:#1a4b8c}.b2{background:#f3eeff;color:#5b2d9e}
.b3{background:#fef6ee;color:#a05c10}.b4{background:#eef7f7;color:#0f6e6e}.b5{background:#feeef5;color:#9e1a5e}
.b6{background:#f0eeea;color:#5f5e5a}.b7{background:#fef8ee;color:#b8750a}.b8{background:#e6f1fb;color:#185fa5}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
select,input[type=text],input[type=number],input[type=date],textarea{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);outline:none}
select:focus,input:focus,textarea:focus{border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(45,107,71,0.12)}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:500;color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
.modal-lg{max-width:700px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.modal-title{font-size:15px;font-weight:600;margin-top:2px}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.detail-block{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px}
.attachment-box{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.attachment-img{width:100%;max-height:400px;object-fit:contain;background:var(--surface2);display:block}
.attachment-pdf{width:100%;height:400px;border:none;display:block}
.attachment-placeholder{padding:28px;text-align:center;color:var(--muted);font-size:13px;background:var(--surface2)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface2)}
.upload-zone:hover,.upload-zone.dragging{border-color:var(--accent-mid);background:var(--accent-light)}
.upload-icon{font-size:32px;margin-bottom:10px}
.upload-text{font-size:13px;color:var(--muted)}
.upload-text strong{color:var(--accent-mid)}
.scan-spinner{width:36px;height:36px;border:3px solid var(--accent-light);border-top-color:var(--accent-mid);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.scanning-state{text-align:center;padding:32px}
.scan-result-preview{background:var(--accent-light);border:1px solid rgba(45,107,71,0.2);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--accent)}
.scan-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent-mid);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;margin-bottom:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
.amount{font-family:'DM Mono',monospace}
.progress-bar{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--accent-mid);transition:width 0.5s ease}
.year-selector{display:flex;align-items:center;gap:8px}
.delete-confirm{background:var(--danger-light);border:1px solid rgba(192,57,43,0.15);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--danger)}
.api-banner{background:var(--amber-light);border-bottom:1px solid rgba(184,117,10,0.2);padding:10px 24px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-banner input{font-size:12px;padding:4px 8px;width:280px;font-family:'DM Mono',monospace}
.cat-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
.cat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface)}
.cat-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cat-name{flex:1;font-size:13px}
.cat-add-row{display:flex;gap:8px;margin-top:10px}
.cat-add-row input{flex:1}
.hint{font-size:11px;color:var(--muted)}
.nav-divider{height:1px;background:var(--border);margin:8px 0}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{display:none}.topbar-sub{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CHART_COLORS = ['#2d6b47','#1a4b8c','#5b2d9e','#b8750a','#0f6e6e','#9e1a5e','#c0392b','#185fa5','#5f5e5a','#a05c10'];

const DEFAULT_CATEGORIES = [
  { id:'fleet',  name:'Fleet Management', subs:['Maintenance','Insurance & Road Tax','Touch & Go'] },
  { id:'office', name:'Office Management', subs:['Pantry','Stationery','Cleaning','Aircond Service','Pest Control'] },
  { id:'it',     name:'IT Asset Management', subs:[] },
  { id:'admin',  name:'Administration', subs:[] },
  { id:'adhoc',  name:'Ad Hoc Expenses', subs:[] },
];

const SAMPLE_DATA = [
  {id:1, date:'2026-01-08', vendor:'Petronas',       amount:320.00,  cat:'Fleet Management',    sub:'Maintenance',          description:'Engine oil & service, Proton X70',   fileData:null,fileName:null,fileType:null},
  {id:2, date:'2026-01-15', vendor:'Pos Malaysia',   amount:1800.00, cat:'Fleet Management',    sub:'Insurance & Road Tax', description:'Road tax renewal, WXX1234',           fileData:null,fileName:null,fileType:null},
  {id:3, date:'2026-02-03', vendor:'Touch & Go',     amount:200.00,  cat:'Fleet Management',    sub:'Touch & Go',           description:'TnG reload, company vehicle',          fileData:null,fileName:null,fileType:null},
  {id:4, date:'2026-02-10', vendor:'Jaya Grocer',    amount:185.50,  cat:'Office Management',   sub:'Pantry',               description:'Coffee, tea, snacks for office',       fileData:null,fileName:null,fileType:null},
  {id:5, date:'2026-02-20', vendor:'MPH',            amount:95.00,   cat:'Office Management',   sub:'Stationery',           description:'A4 paper, pens, folders',              fileData:null,fileName:null,fileType:null},
  {id:6, date:'2026-03-05', vendor:'Ecolab',         amount:260.00,  cat:'Office Management',   sub:'Cleaning',             description:'Monthly cleaning supplies',            fileData:null,fileName:null,fileType:null},
  {id:7, date:'2026-03-12', vendor:'Dell Malaysia',  amount:4200.00, cat:'IT Asset Management', sub:'',                     description:'Monitor replacement, finance dept',    fileData:null,fileName:null,fileType:null},
  {id:8, date:'2026-03-18', vendor:'Lembaga Hasil',  amount:500.00,  cat:'Administration',      sub:'',                     description:'Stamp duty, tenancy agreement',        fileData:null,fileName:null,fileType:null},
  {id:9, date:'2026-03-25', vendor:'Hazloc Solution',amount:300.00,  cat:'Office Management',   sub:'Pest Control',         description:'Pest control, unit 15-7 & 15-8',      fileData:null,fileName:null,fileType:null},
  {id:10,date:'2026-04-01', vendor:'Sachenais Food', amount:1300.00, cat:'Ad Hoc Expenses',     sub:'',                     description:'Catering 25 pax, 1 & 2 Apr 2026',    fileData:null,fileName:null,fileType:null},
];

const fmt = n => 'RM '+Number(n).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
const bc  = i => 'b'+(i%9);
// Returns display label for an expense: "Fleet Management › Maintenance" or just "Administration"
const catLabel = e => e.sub ? `${e.cat} › ${e.sub}` : e.cat;

const SKEY='farcapital_exp_v5', AKEY='farcapital_apikey', CKEY='farcapital_cat_v5';
const loadEx  = ()=>{ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):SAMPLE_DATA; }catch{return SAMPLE_DATA;} };
const loadCat = ()=>{ try{ const r=localStorage.getItem(CKEY); return r?JSON.parse(r):DEFAULT_CATEGORIES; }catch{return DEFAULT_CATEGORIES;} };

/* ════════════════════ APP ════════════════════ */
function App(){
  const [page,       setPage]       = useState('dashboard');
  const [expenses,   setExpenses]   = useState(loadEx);
  const [categories, setCategories] = useState(loadCat);
  const [showAdd,    setShowAdd]    = useState(false);
  const [editItem,   setEditItem]   = useState(null);
  const [deleteItem, setDeleteItem] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [filterYear, setFilterYear] = useState(new Date().getFullYear());
  const [filterMonth,setFilterMonth]= useState('');
  const [filterCat,  setFilterCat]  = useState('');  // filters on cat name
  const [filterSub,  setFilterSub]  = useState('');  // filters on sub name
  const [apiKey,     setApiKey]     = useState(()=>localStorage.getItem(AKEY)||'');
  const [apiInput,   setApiInput]   = useState('');
  const [showApi,    setShowApi]    = useState(false);
  const nextId = useRef(Date.now());

  useEffect(()=>{ try{localStorage.setItem(SKEY,JSON.stringify(expenses));}catch{} },[expenses]);
  useEffect(()=>{ try{localStorage.setItem(CKEY,JSON.stringify(categories));}catch{} },[categories]);

  const allYears = [...new Set([...expenses.map(e=>new Date(e.date).getFullYear()),new Date().getFullYear()])].sort((a,b)=>b-a);

  const addExpense = (data, fromUpload=false) => {
    setExpenses(prev=>[...prev,{...data,id:nextId.current++}]);
    setShowAdd(false);
    if(fromUpload) setPage('expenses');
  };
  const updExpense = data => { setExpenses(prev=>prev.map(e=>e.id===data.id?{...data}:e)); setEditItem(null); };
  const delExpense = id   => { setExpenses(prev=>prev.filter(e=>e.id!==id)); setDeleteItem(null); };
  const saveApi    = ()   => { const t=apiInput.trim(); setApiKey(t); localStorage.setItem(AKEY,t); setShowApi(false); setApiInput(''); };

  const filtered = expenses.filter(e=>{
    const d=new Date(e.date);
    if(filterYear  && d.getFullYear()!==Number(filterYear))   return false;
    if(filterMonth && (d.getMonth()+1)!==Number(filterMonth)) return false;
    if(filterCat   && e.cat!==filterCat)                      return false;
    if(filterSub   && e.sub!==filterSub)                      return false;
    return true;
  });

  const nav=[{id:'dashboard',icon:'▦',label:'Dashboard'},{id:'expenses',icon:'≡',label:'All Expenses'},{id:'upload',icon:'⬆',label:'Scan Receipt'},{id:'settings',icon:'⚙',label:'Settings'}];

  return(
    <div className="app">
      {/* ── Topbar ── */}
      <div className="topbar">
        <div className="topbar-brand">
          <div className="topbar-logo">FC</div>
          <span className="topbar-name">Far Capital</span>
          <span className="topbar-sub">Expense Manager</span>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>{setShowApi(v=>!v);setApiInput('');}}>{apiKey?'🔑 API Key ✓':'🔑 Set API Key'}</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage('upload')}>⬆ Scan Receipt</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Add Expense</button>
        </div>
      </div>

      {showApi&&(
        <div className="api-banner">
          <span>Anthropic API key (enables AI scanning):</span>
          <input type="password" placeholder="sk-ant-..." value={apiInput} onChange={e=>setApiInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveApi()}/>
          <button className="btn btn-outline btn-sm" onClick={saveApi}>Save</button>
          <button className="btn btn-outline btn-sm" onClick={()=>setShowApi(false)}>Cancel</button>
          <span style={{opacity:0.7}}>Stored in your browser only.</span>
        </div>
      )}

      <div className="main">
        {/* ── Sidebar ── */}
        <nav className="sidebar">
          {nav.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>

        {/* ── Content ── */}
        <div className="content">
          {page==='dashboard'&&<Dashboard expenses={expenses} allYears={allYears} categories={categories} onDetail={setDetailItem}/>}
          {page==='expenses' &&<ExpensesPage expenses={filtered} allExp={expenses} filterYear={filterYear} setFilterYear={setFilterYear} filterMonth={filterMonth} setFilterMonth={setFilterMonth} filterCat={filterCat} setFilterCat={setFilterCat} filterSub={filterSub} setFilterSub={setFilterSub} onEdit={setEditItem} onDelete={setDeleteItem} onDetail={setDetailItem} categories={categories}/>}
          {page==='upload'   &&<UploadPage onAdd={d=>addExpense(d,true)} apiKey={apiKey} categories={categories}/>}
          {page==='settings' &&<SettingsPage categories={categories} setCategories={setCategories} expenses={expenses} setExpenses={setExpenses} apiKey={apiKey} setApiKey={k=>{setApiKey(k);localStorage.setItem(AKEY,k);}}/>}
        </div>
      </div>

      {showAdd    &&<ExpenseModal title="Add Expense"  categories={categories} onSave={addExpense}   onClose={()=>setShowAdd(false)}/>}
      {editItem   &&<ExpenseModal title="Edit Expense" categories={categories} item={editItem} onSave={updExpense} onClose={()=>setEditItem(null)}/>}
      {deleteItem &&<DeleteModal  item={deleteItem} onConfirm={()=>delExpense(deleteItem.id)} onClose={()=>setDeleteItem(null)}/>}
      {detailItem &&<DetailModal  item={detailItem} categories={categories} onEdit={()=>{setEditItem(detailItem);setDetailItem(null);}} onDelete={()=>{setDeleteItem(detailItem);setDetailItem(null);}} onClose={()=>setDetailItem(null)}/>}
    </div>
  );
}

/* ════════════════════ DASHBOARD ════════════════════ */
function Dashboard({expenses,allYears,categories,onDetail}){
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  // compare mode: show two years side by side
  const [yearA, setYearA]=useState(allYears.includes(now.getFullYear()-1)?now.getFullYear()-1:allYears[allYears.length-1]||now.getFullYear());
  const [yearB, setYearB]=useState(now.getFullYear());

  const expA=expenses.filter(e=>new Date(e.date).getFullYear()===yearA);
  const expB=expenses.filter(e=>new Date(e.date).getFullYear()===yearB);
  const totalA=expA.reduce((s,e)=>s+e.amount,0);
  const totalB=expB.reduce((s,e)=>s+e.amount,0);
  const mTotA=Array(12).fill(0); expA.forEach(e=>{mTotA[new Date(e.date).getMonth()]+=e.amount;});
  const mTotB=Array(12).fill(0); expB.forEach(e=>{mTotB[new Date(e.date).getMonth()]+=e.amount;});

  const mExp=expenses.filter(e=>{const d=new Date(e.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
  const mTotal=mExp.reduce((s,e)=>s+e.amount,0);

  const catTotB={};
  expB.forEach(e=>{ const k=e.cat; catTotB[k]=(catTotB[k]||0)+e.amount; });
  const topCat=Object.entries(catTotB).sort((a,b)=>b[1]-a[1])[0];
  const sortedCats=Object.entries(catTotB).sort((a,b)=>b[1]-a[1]);
  const maxC=sortedCats[0]?.[1]||1;

  // recent = latest 8 across both years combined
  const recent=[...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);

  const barRef=useRef(), donutRef=useRef(), barC=useRef(), donutC=useRef();

  useEffect(()=>{
    if(!barRef.current)return;
    if(barC.current)barC.current.destroy();
    barC.current=new Chart(barRef.current,{
      type:'bar',
      data:{labels:MONTHS,datasets:[
        {label:String(yearA),data:mTotA,backgroundColor:'rgba(45,107,71,0.35)',borderRadius:3,borderSkipped:false},
        {label:String(yearB),data:mTotB,backgroundColor:'#2d6b47',borderRadius:3,borderSkipped:false},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{boxWidth:10,font:{size:11},color:'#6b6b65'}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#6b6b65'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#6b6b65',callback:v=>v>=1000?'RM '+(v/1000).toFixed(0)+'k':'RM '+v}}}}
    });
    return()=>{if(barC.current)barC.current.destroy();};
  },[mTotA,mTotB,yearA,yearB]);

  useEffect(()=>{
    if(!donutRef.current)return;
    if(donutC.current)donutC.current.destroy();
    const cats=Object.keys(catTotB); if(!cats.length)return;
    donutC.current=new Chart(donutRef.current,{type:'doughnut',data:{labels:cats,datasets:[{data:cats.map(c=>catTotB[c]),backgroundColor:CHART_COLORS.slice(0,cats.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}});
    return()=>{if(donutC.current)donutC.current.destroy();};
  },[catTotB]);

  const pctChange=totalA>0?((totalB-totalA)/totalA*100).toFixed(1):null;

  return(
    <div>
      <div className="page-header">
        <div><div className="page-title">Overview</div><div className="page-sub">Financial snapshot for Far Capital</div></div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--muted)'}}>Compare</span>
          <select value={yearA} onChange={e=>setYearA(Number(e.target.value))}>{allYears.map(y=><option key={y} value={y}>{y}</option>)}</select>
          <span style={{fontSize:12,color:'var(--muted)'}}>vs</span>
          <select value={yearB} onChange={e=>setYearB(Number(e.target.value))}>{allYears.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>
      </div>

      {/* Year comparison stat cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <div className="stat-card">
          <div className="stat-label">Total {yearA}</div>
          <div className="stat-value" style={{color:'var(--muted)'}}>{fmt(totalA)}</div>
          <div className="stat-sub">{expA.length} transactions</div>
        </div>
        <div className="stat-card stat-green">
          <div className="stat-label">Total {yearB}</div>
          <div className="stat-value">{fmt(totalB)}</div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
            <span className="stat-sub">{expB.length} transactions</span>
            {pctChange!==null&&<span style={{fontSize:11,fontWeight:500,color:Number(pctChange)>0?'var(--danger)':'var(--accent-mid)',background:Number(pctChange)>0?'var(--danger-light)':'var(--accent-light)',padding:'1px 6px',borderRadius:20}}>{Number(pctChange)>0?'↑':'↓'}{Math.abs(pctChange)}% vs {yearA}</span>}
          </div>
        </div>
      </div>
      <div className="stats-grid" style={{marginBottom:24}}>
        <div className="stat-card stat-amber"><div className="stat-label">This Month</div><div className="stat-value">{fmt(mTotal)}</div><div className="stat-sub">{mExp.length} transactions</div></div>
        <div className="stat-card"><div className="stat-label">Monthly Avg ({yearB})</div><div className="stat-value">{fmt(totalB/12)}</div><div className="stat-sub">Full year basis</div></div>
        <div className="stat-card"><div className="stat-label">Top Category ({yearB})</div><div className="stat-value" style={{fontSize:13,marginTop:4,lineHeight:1.3}}>{topCat?topCat[0]:'—'}</div><div className="stat-sub">{topCat?fmt(topCat[1]):'—'}</div></div>
        <div className="stat-card"><div className="stat-label">YoY Difference</div><div className="stat-value" style={{fontSize:18,color:totalB>totalA?'var(--danger)':'var(--accent-mid)'}}>{totalA>0?(totalB>totalA?'+':'')+fmt(totalB-totalA):'—'}</div><div className="stat-sub">{yearA} → {yearB}</div></div>
      </div>

      <div className="charts-row">
        <div className="card">
          <div className="card-header"><span className="card-title">Monthly spend — {yearA} vs {yearB}</span></div>
          <div className="card-body"><div style={{position:'relative',height:220}}><canvas ref={barRef}></canvas></div></div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">By category — {yearB}</span></div>
          <div className="card-body">
            <div style={{position:'relative',height:140,marginBottom:16}}><canvas ref={donutRef}></canvas></div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {sortedCats.slice(0,5).map(([cat,amt])=>(
                <div key={cat}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}><span style={{color:'var(--muted)'}}>{cat}</span><span style={{fontFamily:'DM Mono,monospace',fontSize:11}}>{fmt(amt)}</span></div>
                  <div className="progress-bar"><div className="progress-fill" style={{width:(amt/maxC*100)+'%'}}></div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Recent transactions</span><span className="hint">Double-click a row to view details</span></div>
        <table>
          <thead><tr><th>Date</th><th>Vendor</th><th>Category</th><th>Description</th><th style={{textAlign:'right'}}>Amount</th></tr></thead>
          <tbody>
            {recent.map(e=>{
              const ci=categories.findIndex(c=>c.name===e.cat);
              return(<tr key={e.id} className="clickable" onDoubleClick={()=>onDetail(e)}>
                <td style={{color:'var(--muted)',fontSize:12,whiteSpace:'nowrap'}}>{new Date(e.date).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'2-digit'})}</td>
                <td style={{fontWeight:500}}>{e.vendor}</td>
                <td><span className={`badge ${bc(ci<0?8:ci)}`}>{catLabel(e)}</span></td>
                <td style={{color:'var(--muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.description}</td>
                <td style={{textAlign:'right'}} className="amount">{fmt(e.amount)}</td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════ ALL EXPENSES ════════════════════ */

    <div>

            <tbody>

                return(<tr key={e.id} className="clickable" onDoubleClick={()=>onDetail(e)}>
                  <td style={{color:'var(--muted)',fontSize:12,whiteSpace:'nowrap'}}>{new Date(e.date).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'2-digit'})}</td>
                  <td style={{fontWeight:500}}>{e.vendor}</td>
                  <td><span className={`badge ${bc(ci<0?8:ci)}`}>{e.cat}</span></td>
                  <td style={{color:'var(--muted)',fontSize:12}}>{e.sub||'—'}</td>
                  <td style={{color:'var(--muted)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.description}</td>
                  <td style={{textAlign:'right'}} className="amount">{fmt(e.amount)}</td>
                  <td style={{textAlign:'center',fontSize:16}}>{e.fileData?'📎':'—'}</td>
                  <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
                    <button className="btn btn-outline btn-sm" style={{marginRight:4}} onClick={ev=>{ev.stopPropagation();onEdit(e);}}>Edit</button>

  );
}

/* ════════════════════ UPLOAD PAGE ════════════════════ */
function UploadPage({onAdd,apiKey,categories}){
  const firstCat=categories[0]?.name||'';
  const [stage,   setStage]   = useState('idle');
  const [result,  setResult]  = useState(null);
  const [dragging,setDragging]= useState(false);
  const [errMsg,  setErrMsg]  = useState('');
  const [captured,setCaptured]= useState(null);
  const [form,    setForm]    = useState({date:new Date().toISOString().slice(0,10),vendor:'',amount:'',cat:firstCat,sub:'',description:''});
  const fileRef=useRef();
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  const processFile=async file=>{
    if(!file)return;
    if(!apiKey){setErrMsg('Please set your Anthropic API key first.');setStage('error');return;}
    setStage('scanning');setErrMsg('');
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      setCaptured({base64,name:file.name,type:file.type});
      const isImg=file.type.startsWith('image/'), isPDF=file.type==='application/pdf';
      // Build a flat category list for the AI prompt
      const catList=categories.map(c=>c.subs.length>0?c.subs.map(s=>`${c.name} > ${s}`).join(' | '):`${c.name}`).join(' | ');
      const prompt=`You are an expense extraction assistant for Far Capital, a Malaysian company.

Read this receipt or invoice carefully and extract:
- vendor: the supplier/company at the TOP of the document (the issuer), NOT the "TO:" recipient (Far Capital is the recipient, not the vendor)
- date: the invoice or receipt date in YYYY-MM-DD format
- amount: the final Total Payable / Grand Total as a plain number in RM, no currency symbol
- cat: the main category name (e.g. "Fleet Management", "Office Management", "IT Asset Management", "Administration", "Ad Hoc Expenses")
- sub: the sub-category if applicable (e.g. "Maintenance", "Pantry", "Cleaning") — leave empty string if none applies
- description: one concise line summarizing what was purchased or serviced

Available categories: ${catList}

Respond ONLY with valid JSON, no markdown, no extra text:
{"vendor":"...","date":"YYYY-MM-DD","amount":0.00,"cat":"...","sub":"...","description":"..."}`;

      let content;
      if(isImg)      content=[{type:'image',source:{type:'base64',media_type:file.type,data:base64}},{type:'text',text:prompt}];
      else if(isPDF) content=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},{type:'text',text:prompt}];
      else           content=[{type:'text',text:prompt}];

      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content}]})});
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'API error '+res.status);}
      const data=await res.json();
      const text=data.content?.find(b=>b.type==='text')?.text||'';
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      setResult(parsed);
      const matchedCat=categories.find(c=>c.name===parsed.cat);
      setForm({
        date:parsed.date||new Date().toISOString().slice(0,10),
        vendor:parsed.vendor||'',
        amount:parsed.amount?.toString()||'',
        cat:matchedCat?parsed.cat:firstCat,
        sub:matchedCat?.subs.includes(parsed.sub)?parsed.sub:'',
        description:parsed.description||''
      });
      setStage('result');
    }catch(e){setErrMsg('Could not extract: '+e.message+'. Fill in manually below.');setStage('manual');}
  };

  const handleDrop=e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};

  const handleSave=()=>{
    if(!form.vendor||!form.amount||!form.date)return;
    onAdd({date:form.date,vendor:form.vendor,amount:parseFloat(form.amount),cat:form.cat,sub:form.sub,description:form.description,fileData:captured?.base64||null,fileName:captured?.name||null,fileType:captured?.type||null});
    setStage('saved');setResult(null);setCaptured(null);
    setForm({date:new Date().toISOString().slice(0,10),vendor:'',amount:'',cat:firstCat,sub:'',description:''});
  };

  return(
    <div style={{maxWidth:580}}>
      <div className="page-header" style={{display:'block'}}>
        <div className="page-title">Scan Receipt / Invoice</div>
        <div className="page-sub">Upload a photo or PDF — AI extracts and categorizes automatically</div>
      </div>
      {!apiKey&&<div style={{background:'var(--amber-light)',border:'1px solid rgba(184,117,10,0.25)',borderRadius:'var(--radius)',padding:'12px 16px',marginBottom:16,fontSize:13,color:'var(--amber)'}}>⚠ Set your API key (🔑 top bar) to enable AI scanning. You can still add expenses manually.</div>}

      {stage==='idle'&&(
        <div className="card"><div className="card-body">
          <div className={`upload-zone ${dragging?'dragging':''}`} onClick={()=>fileRef.current.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={handleDrop}>
            <div className="upload-icon">📄</div>
            <div className="upload-text"><strong>Click to upload</strong> or drag & drop</div>
            <div className="upload-text" style={{fontSize:12,marginTop:4}}>JPG, PNG, PDF — receipt or invoice</div>
          </div>
          <input ref={fileRef} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>processFile(e.target.files[0])}/>
          <div style={{textAlign:'center',margin:'14px 0',color:'var(--muted)',fontSize:12}}>— or —</div>
          <button className="btn btn-outline" style={{width:'100%'}} onClick={()=>setStage('manual')}>Enter manually</button>
        </div></div>
      )}

      {stage==='scanning'&&(
        <div className="card"><div className="card-body scanning-state">
          <div className="scan-spinner"></div>
          <div style={{fontWeight:500,marginBottom:4}}>Scanning document...</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>AI is reading vendor, amount and category</div>
        </div></div>
      )}

      {(stage==='result'||stage==='manual')&&(
        <div className="card">
          <div className="card-header">
            <div>{stage==='result'&&<div className="scan-badge">✓ AI extracted</div>}<span className="card-title">{stage==='result'?'Review & confirm':'Enter expense details'}</span></div>
            <button className="btn btn-outline btn-sm" onClick={()=>{setStage('idle');setResult(null);setCaptured(null);}}>Cancel</button>
          </div>
          <div className="card-body">
            {stage==='result'&&result&&<div className="scan-result-preview" style={{marginBottom:14}}>Identified: <strong>{result.vendor}</strong> · <strong>{fmt(result.amount)}</strong> · <strong>{result.cat}{result.sub?' › '+result.sub:''}</strong></div>}
            {errMsg&&<div style={{background:'var(--danger-light)',border:'1px solid rgba(192,57,43,0.15)',borderRadius:'var(--radius-sm)',padding:'10px 12px',fontSize:12,color:'var(--danger)',marginBottom:14}}>{errMsg}</div>}
            {captured&&(
              <div style={{marginBottom:12}}>
                <div className="form-label" style={{marginBottom:6}}>Attached document</div>
                <div className="attachment-box">
                  {captured.type.startsWith('image/')?(<img className="attachment-img" src={`data:${captured.type};base64,${captured.base64}`} alt="receipt" style={{maxHeight:160}}/>):(<div className="attachment-placeholder">📎 {captured.name} (PDF — will be saved with record)</div>)}
                </div>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Date *</label><input type="date" value={form.date} onChange={e=>sf('date',e.target.value)}/></div>
                <div className="form-group"><label className="form-label">Amount (RM) *</label><input type="number" placeholder="0.00" step="0.01" min="0" value={form.amount} onChange={e=>sf('amount',e.target.value)}/></div>
              </div>
              <div className="form-group"><label className="form-label">Vendor / Merchant *</label><input type="text" placeholder="e.g. Grab, Petronas" value={form.vendor} onChange={e=>sf('vendor',e.target.value)}/></div>
              <CategoryPicker categories={categories} cat={form.cat} sub={form.sub} onChange={(c,s)=>setForm(f=>({...f,cat:c,sub:s}))}/>
              <div className="form-group"><label className="form-label">Description</label><input type="text" placeholder="Brief note" value={form.description} onChange={e=>sf('description',e.target.value)}/></div>
            </div>
          </div>
          <div style={{padding:'14px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-outline" onClick={()=>setStage('idle')}>Back</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={!form.vendor||!form.amount||!form.date}>Save Expense</button>
          </div>
        </div>
      )}

      {stage==='error'&&<div className="card"><div className="card-body"><div className="delete-confirm" style={{marginBottom:14}}>{errMsg}</div><button className="btn btn-outline" onClick={()=>setStage('idle')}>Go back</button></div></div>}

      {stage==='saved'&&(
        <div className="card"><div className="card-body" style={{textAlign:'center',padding:'36px 20px'}}>
          <div style={{fontSize:36,marginBottom:12}}>✅</div>
          <div style={{fontWeight:600,fontSize:16,marginBottom:4}}>Expense saved!</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>Redirected to All Expenses.</div>
          <button className="btn btn-primary" onClick={()=>setStage('idle')}>Scan another</button>
        </div></div>
      )}
    </div>
  );
}

/* ════════════════════ CATEGORY PICKER (reusable) ════════════════════ */
function CategoryPicker({categories, cat, sub, onChange}){
  const selCat=categories.find(c=>c.name===cat)||categories[0];
  const hasSubs=selCat?.subs?.length>0;
  return(
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      <div className="form-group" style={{flex:1,minWidth:160}}>
        <label className="form-label">Category *</label>
        <select value={cat} onChange={e=>onChange(e.target.value,'')}>
          {categories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
        </select>
      </div>
      {hasSubs&&(
        <div className="form-group" style={{flex:1,minWidth:140}}>
          <label className="form-label">Sub-category</label>
          <select value={sub} onChange={e=>onChange(cat,e.target.value)}>
            <option value="">— None —</option>
            {selCat.subs.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ EXPENSE MODAL ════════════════════ */
function ExpenseModal({title,item,categories,onSave,onClose}){
  const firstCat=categories[0]?.name||'';
  const [form,setForm]=useState(item
    ? {...item, amount:item.amount.toString()}
    : {date:new Date().toISOString().slice(0,10),vendor:'',amount:'',cat:firstCat,sub:'',description:'',fileData:null,fileName:null,fileType:null}
  );
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const valid=form.vendor.trim()&&form.amount&&form.date&&form.cat;
  const handleFile=async file=>{
    if(!file)return;
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    setForm(f=>({...f,fileData:b64,fileName:file.name,fileType:file.type}));
  };
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header"><span className="modal-title">{title}</span><button className="btn btn-outline btn-sm" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Date *</label><input type="date" value={form.date} onChange={e=>sf('date',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Amount (RM) *</label><input type="number" placeholder="0.00" step="0.01" min="0" value={form.amount} onChange={e=>sf('amount',e.target.value)}/></div>
          </div>
          <div className="form-group"><label className="form-label">Vendor / Merchant *</label><input type="text" value={form.vendor} onChange={e=>sf('vendor',e.target.value)}/></div>
          <CategoryPicker categories={categories} cat={form.cat} sub={form.sub} onChange={(c,s)=>setForm(f=>({...f,cat:c,sub:s}))}/>
          <div className="form-group"><label className="form-label">Description</label><input type="text" placeholder="Brief note" value={form.description} onChange={e=>sf('description',e.target.value)}/></div>
          <div className="form-group">
            <label className="form-label">Attach document (optional)</label>
            <input type="file" accept="image/*,.pdf" onChange={e=>handleFile(e.target.files[0])} style={{fontSize:12}}/>
            {form.fileData&&<div style={{fontSize:12,color:'var(--accent-mid)',marginTop:4}}>📎 {form.fileName}</div>}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!valid} onClick={()=>onSave({...form,amount:parseFloat(form.amount)})}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ DELETE MODAL ════════════════════ */
function DeleteModal({item,onConfirm,onClose}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:400}}>
        <div className="modal-header"><span className="modal-title">Delete expense</span><button className="btn btn-outline btn-sm" onClick={onClose}>✕</button></div>
        <div className="modal-body"><div className="delete-confirm">Permanently delete <strong>{item.vendor}</strong> ({fmt(item.amount)}) dated {new Date(item.date).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'})}? This cannot be undone.</div></div>
        <div className="modal-footer"><button className="btn btn-outline" onClick={onClose}>Cancel</button><button className="btn btn-danger" onClick={onConfirm}>Delete</button></div>
      </div>
    </div>
  );
}

/* ════════════════════ CATEGORY MANAGER ════════════════════ */
/* ════════════════════ SETTINGS PAGE ════════════════════ */
function SettingsPage({categories,setCategories,expenses,setExpenses,apiKey,setApiKey}){
  const [newName,   setNewName]   = useState('');
  const [newSubName,setNewSubName]= useState('');
  const [newSubId,  setNewSubId]  = useState(null);
  const [editing,   setEditing]   = useState(null); // {id, name, sub} — sub===null means parent
  const [local,     setLocal]     = useState(()=>categories.map(c=>({...c, subs:[...(c.subs||[])]})));
  const [apiInput,  setApiInput]  = useState('');
  const [apiSaved,  setApiSaved]  = useState(false);
  const [catSaved,  setCatSaved]  = useState(false);

  useEffect(()=>setLocal(categories.map(c=>({...c,subs:[...(c.subs||[])]}))),[categories]);

  const addCat=()=>{
    const t=newName.trim();
    if(!t||local.find(c=>c.name===t))return;
    setLocal(p=>[...p,{id:'cat-'+Date.now(),name:t,subs:[]}]);
    setNewName('');
  };
  const removeCat=id=>setLocal(p=>p.filter(c=>c.id!==id));
  const addSub=id=>{
    const t=newSubName.trim();
    if(!t)return;
    setLocal(p=>p.map(c=>c.id===id?{...c,subs:[...c.subs.filter(s=>s!==t),t]}:c));
    setNewSubName(''); setNewSubId(null);
  };
  const removeSub=(id,sub)=>setLocal(p=>p.map(c=>c.id===id?{...c,subs:c.subs.filter(s=>s!==sub)}:c));
  const renameSave=()=>{
    if(!editing||!editing.name.trim()){setEditing(null);return;}
    const newVal=editing.name.trim();
    if(editing.sub===null){
      // Renaming a parent category
      setLocal(p=>p.map(c=>c.id===editing.id?{...c,name:newVal}:c));
    } else {
      // Renaming a sub-category
      setLocal(p=>p.map(c=>c.id===editing.id?{...c,subs:c.subs.map(s=>s===editing.sub?newVal:s)}:c));
    }
    setEditing(null);
  };
  const saveCats=()=>{
    // Build rename maps for parents and subs
    const catMap={}, subMap={};
    categories.forEach(orig=>{
      const updated=local.find(l=>l.id===orig.id);
      if(updated&&updated.name!==orig.name) catMap[orig.name]=updated.name;
      // sub renames: match by index
      (orig.subs||[]).forEach((os,si)=>{
        const ns=updated?.subs?.[si];
        if(ns&&ns!==os) subMap[orig.name+'|'+os]=(catMap[orig.name]||orig.name)+'|'+ns;
      });
    });
    if(Object.keys(catMap).length>0||Object.keys(subMap).length>0){
      setExpenses(prev=>prev.map(e=>{
        const newCat=catMap[e.cat]||e.cat;
        const subKey=(catMap[e.cat]||e.cat=== e.cat?e.cat:catMap[e.cat])+'|'+e.sub;
        // Actually use original cat for lookup
        const origSubKey=e.cat+'|'+e.sub;
        const subRename=subMap[origSubKey];
        const newSub=subRename?subRename.split('|')[1]:e.sub;
        return {...e,cat:newCat,sub:newSub};
      }));
    }
    setCategories(local);
    setCatSaved(true);
    setTimeout(()=>setCatSaved(false),2500);
  };
  const saveApiKey=()=>{
    setApiKey(apiInput.trim());
    setApiInput('');
    setApiSaved(true);
    setTimeout(()=>setApiSaved(false),2500);
  };

  return(
    <div style={{maxWidth:680}}>
      <div className="page-header" style={{display:'block'}}>
        <div className="page-title">Settings</div>
        <div className="page-sub">Manage categories and application configuration</div>
      </div>

      {/* ── Category Management ── */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">
          <span className="card-title">Expense Categories</span>
          {catSaved&&<span style={{fontSize:12,color:'var(--accent-mid)',fontWeight:500}}>✓ Saved & applied to all records</span>}
        </div>
        <div className="card-body">
          <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Each category can have sub-categories. Click any name to rename it inline. Changes are applied to all existing expense records on save.</p>
          <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:500,overflowY:'auto'}}>
            {local.map((c,i)=>(
              <div key={c.id} style={{border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
                {/* Parent row */}
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'var(--surface2)'}}>
                  <span style={{width:10,height:10,borderRadius:2,background:CHART_COLORS[i%CHART_COLORS.length],flexShrink:0}}></span>
                  {editing&&editing.id===c.id&&editing.sub===null?(
                    <input style={{flex:1,fontSize:13,fontWeight:500,padding:'2px 8px'}} value={editing.name}
                      onChange={e=>setEditing(v=>({...v,name:e.target.value}))}
                      onKeyDown={e=>{if(e.key==='Enter')renameSave();if(e.key==='Escape')setEditing(null);}} autoFocus/>
                  ):(
                    <span style={{flex:1,fontSize:13,fontWeight:500,cursor:'text'}} onClick={()=>setEditing({id:c.id,name:c.name,sub:null})}>{c.name}</span>
                  )}
                  {editing&&editing.id===c.id&&editing.sub===null?(
                    <><button className="btn btn-primary btn-sm" onClick={renameSave}>✓</button><button className="btn btn-outline btn-sm" onClick={()=>setEditing(null)}>✕</button></>
                  ):(
                    <button className="btn btn-outline btn-sm" onClick={()=>setEditing({id:c.id,name:c.name,sub:null})}>Rename</button>
                  )}
                  <button className="btn btn-danger btn-sm" onClick={()=>removeCat(c.id)} title="Delete category">✕</button>
                </div>
                {/* Sub-category rows */}
                {(c.subs||[]).map((s,si)=>(
                  <div key={si} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px 7px 28px',borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                    <span style={{fontSize:11,color:'var(--muted)'}}>└</span>
                    {editing&&editing.id===c.id&&editing.sub===s?(
                      <input style={{flex:1,fontSize:12,padding:'2px 8px'}} value={editing.name}
                        onChange={e=>setEditing(v=>({...v,name:e.target.value}))}
                        onKeyDown={e=>{if(e.key==='Enter')renameSave();if(e.key==='Escape')setEditing(null);}} autoFocus/>
                    ):(
                      <span style={{flex:1,fontSize:12,cursor:'text',color:'var(--text)'}} onClick={()=>setEditing({id:c.id,name:s,sub:s})}>{s}</span>
                    )}
                    {editing&&editing.id===c.id&&editing.sub===s?(
                      <><button className="btn btn-primary btn-sm" onClick={renameSave}>✓</button><button className="btn btn-outline btn-sm" onClick={()=>setEditing(null)}>✕</button></>
                    ):(
                      <button className="btn btn-outline btn-sm" onClick={()=>setEditing({id:c.id,name:s,sub:s})}>Rename</button>
                    )}
                    <button className="btn btn-danger btn-sm" onClick={()=>removeSub(c.id,s)}>✕</button>
                  </div>
                ))}
                {/* Add sub row */}
                <div style={{padding:'6px 12px 6px 28px',borderTop:'1px solid var(--border)',background:'var(--surface)',display:'flex',gap:6}}>
                  <input type="text" placeholder="+ Add sub-category..." value={newSubId===c.id?newSubName:''} style={{flex:1,fontSize:12,padding:'4px 8px'}}
                    onChange={e=>{setNewSubId(c.id);setNewSubName(e.target.value);}}
                    onKeyDown={e=>e.key==='Enter'&&addSub(c.id)}/>
                  <button className="btn btn-outline btn-sm" onClick={()=>addSub(c.id)} disabled={newSubId!==c.id||!newSubName.trim()}>Add</button>
                </div>
              </div>
            ))}
          </div>
          {/* Add new top-level category */}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <input type="text" placeholder="New category name..." value={newName} style={{flex:1}} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()}/>
            <button className="btn btn-outline" onClick={addCat} disabled={!newName.trim()}>+ Add Category</button>
          </div>
          <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={saveCats}>Save changes</button>
          </div>
        </div>
      </div>

      {/* ── API Key ── */}
      <div className="card">
        <div className="card-header">
          <span className="card-title">Anthropic API Key</span>
          {apiSaved&&<span style={{fontSize:12,color:'var(--accent-mid)',fontWeight:500}}>✓ Saved</span>}
        </div>
        <div className="card-body">
          <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Required for AI receipt scanning. Your key is stored only in your browser's local storage and never sent to any server other than Anthropic's API.</p>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:200}}>
              <input type="password" placeholder="sk-ant-..." value={apiInput} onChange={e=>setApiInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveApiKey()} style={{width:'100%',fontFamily:'DM Mono,monospace',fontSize:12}}/>
            </div>
            <button className="btn btn-primary" onClick={saveApiKey} disabled={!apiInput.trim()}>Save key</button>
          </div>
          {apiKey&&(
            <div style={{marginTop:10,fontSize:12,color:'var(--accent-mid)',display:'flex',alignItems:'center',gap:6}}>
              ✓ API key is set &nbsp;<span style={{fontFamily:'DM Mono,monospace',color:'var(--muted)'}}>{apiKey.slice(0,12)}••••••••</span>
              <button className="btn btn-danger btn-sm" style={{marginLeft:4}} onClick={()=>setApiKey('')}>Remove</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
